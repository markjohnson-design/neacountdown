<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#d9f99d">
    
    <title>GCSE NEA DASHBOARD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --lime-bright: #adff2f;
            --lime-bg: #d9f99d;
            --deep-green: #1a2e05;
            --glass: rgba(255, 255, 255, 0.4);
            --accent-border: rgba(255, 255, 255, 0.6);
            --urgency-red: #ff3b3b;
            --pulse-duration: 2s;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--lime-bg);
            background-image: 
                radial-gradient(at 0% 0%, hsla(82, 80%, 75%, 1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(150, 70%, 70%, 1) 0, transparent 50%), 
                radial-gradient(at 50% 100%, hsla(75, 90%, 70%, 1) 0, transparent 50%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--deep-green);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 1000px;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centered now that study sessions are gone */
            gap: 4vh;
            height: 95vh;
        }

        h1 {
            font-weight: 800;
            font-size: clamp(2rem, 6vh, 4rem);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        .deadline-date {
            font-weight: 800;
            font-size: clamp(1rem, 3vh, 1.5rem);
            background: var(--deep-green);
            color: var(--lime-bright);
            padding: 10px 25px;
            border-radius: 100px;
            display: inline-block;
            margin: 0 auto;
            letter-spacing: 2px;
        }

        .section-label { font-weight: 800; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.3em; margin-bottom: 0.8rem; opacity: 0.7; }
        .counter-grid { display: flex; gap: 1rem; justify-content: center; }
        .card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--accent-border); border-radius: 20px; padding: 1.5rem 1rem; flex: 1; max-width: 140px; }
        
        #urgency-zone {
            padding: 20px; border-radius: 35px; border: 3px solid var(--urgency-red);
            background: rgba(255, 255, 255, 0.1);
            animation: totalUrgencyPulse var(--pulse-duration) infinite ease-in-out;
        }

        @keyframes totalUrgencyPulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 59, 59, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 30px 10px rgba(255, 59, 59, 0.25); transform: scale(1.01); }
            100% { box-shadow: 0 0 0 0 rgba(255, 59, 59, 0); transform: scale(1); }
        }

        .number { display: block; font-size: clamp(2rem, 5.5vh, 4.5rem); font-weight: 800; line-height: 1; font-variant-numeric: tabular-nums; }
        .label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; opacity: 0.6; margin-top: 5px; display: block;}

        .quote-text { font-size: clamp(1.2rem, 3vh, 1.8rem); font-weight: 800; font-style: italic; position: relative; display: inline-block; margin-top: 2vh;}
        .quote-highlight { position: absolute; bottom: 2px; left: 0; width: 100%; height: 10px; background: var(--lime-bright); z-index: -1; opacity: 0.8; }

        /* Audio Controls */
        .audio-controls {
            position: fixed; top: 20px; right: 20px;
            background: var(--deep-green); color: white;
            padding: 10px 15px; border-radius: 20px;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: 1000;
        }
        
        .play-btn {
            background: var(--lime-bright); color: var(--deep-green);
            border: none; padding: 8px 16px; border-radius: 12px;
            font-weight: 800; cursor: pointer; font-family: inherit; font-size: 0.9rem;
        }

        .mute-btn {
            background: rgba(255,255,255,0.2); color: white;
            border: none; padding: 5px 10px; border-radius: 12px;
            cursor: pointer; font-size: 1rem;
        }

        input[type="range"] { accent-color: var(--lime-bright); cursor: pointer; width: 80px; }

        @media (max-width: 700px) {
            .counter-grid { display: grid; grid-template-columns: 1fr 1fr; }
            body { overflow-y: auto; height: auto; }
            .container { height: auto; padding: 60px 0 20px 0; justify-content: flex-start; }
        }
    </style>
</head>
<body>

    <div class="audio-controls">
        <button class="play-btn" id="start-music-btn" onclick="startMusic()">START MUSIC</button>
        <button class="mute-btn" id="mute-btn" onclick="toggleMute()" style="display: none;">🔊</button>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5" style="display: none;">
    </div>

    <div class="container">
        <div>
            <h1>GCSE NEA FINAL SUBMISSION</h1>
            <div class="deadline-date">DEADLINE: WED 25 MARCH 2026 • 17:00</div>
        </div>

        <div>
            <div class="section-label">THE JOURNEY SO FAR</div>
            <div class="counter-grid">
                <div class="card"><span class="number" id="e-days">0</span><span class="label">Days In</span></div>
                <div class="card"><span class="number" id="e-hours">00</span><span class="label">Hours</span></div>
                <div class="card"><span class="number" id="e-mins">00</span><span class="label">Mins</span></div>
                <div class="card"><span class="number" id="e-secs">00</span><span class="label">Secs</span></div>
            </div>
        </div>

        <div>
            <div class="section-label" id="pulse-status">THE FINAL COUNTDOWN</div>
            <div id="urgency-zone">
                <div class="counter-grid">
                    <div class="card" style="background: white;"><span class="number" id="r-days">0</span><span class="label">Days Left</span></div>
                    <div class="card" style="background: white;"><span class="number" id="r-hours">00</span><span class="label">Hours</span></div>
                    <div class="card" style="background: white;"><span class="number" id="r-mins">00</span><span class="label">Mins</span></div>
                    <div class="card" style="background: white;"><span class="number" id="r-secs">00</span><span class="label">Secs</span></div>
                </div>
            </div>
        </div>

        <div>
            <div class="quote-text">
                CHASE EXCELLENCE. MAKE EVERY SECOND COUNT.
                <div class="quote-highlight"></div>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="countdown.mp3" type="audio/mpeg">
    </audio>

    <script>
        const start = new Date("June 2, 2025 09:00:00").getTime();
        // Updated Deadline Date
        const end = new Date("March 25, 2026 17:00:00").getTime();
        
        // Music Controls
        const music = document.getElementById("bgMusic");
        const volumeSlider = document.getElementById("volumeSlider");
        const startBtn = document.getElementById("start-music-btn");
        const muteBtn = document.getElementById("mute-btn");
        
        music.volume = 0.5;

        function startMusic() {
            music.play().then(() => {
                startBtn.style.display = "none";
                muteBtn.style.display = "block";
                volumeSlider.style.display = "block";
            }).catch((error) => {
                alert("Cannot find 'countdown.mp3'!\n\nMake sure you downloaded the MP3, named it exactly 'countdown.mp3', and put it in the exact same folder as this HTML file.");
                console.error("Audio Error:", error);
            });
        }

        function toggleMute() {
            if (music.muted) {
                music.muted = false;
                muteBtn.innerText = "🔊";
            } else {
                music.muted = true;
                muteBtn.innerText = "🔇";
            }
        }

        volumeSlider.addEventListener('input', (e) => {
            music.volume = e.target.value;
            if (music.volume === 0) {
                muteBtn.innerText = "🔇";
            } else if (!music.muted) {
                muteBtn.innerText = "🔊";
            }
        });

        // Wake Lock
        let wakeLock = null;
        const requestWakeLock = async () => {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {}
        };
        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock();
        });
        requestWakeLock();

        // Timer Update
        function update() {
            const now = new Date().getTime();

            const eDiff = now - start;
            document.getElementById("e-days").innerText = Math.floor(eDiff / 86400000);
            document.getElementById("e-hours").innerText = Math.floor((eDiff % 86400000) / 3600000).toString().padStart(2,'0');
            document.getElementById("e-mins").innerText = Math.floor((eDiff % 3600000) / 60000).toString().padStart(2,'0');
            document.getElementById("e-secs").innerText = Math.floor((eDiff % 60000) / 1000).toString().padStart(2,'0');

            const rDiff = end - now;
            const daysLeft = Math.floor(rDiff / 86400000);
            
            if (rDiff > 0) {
                document.getElementById("r-days").innerText = daysLeft;
                document.getElementById("r-hours").innerText = Math.floor((rDiff % 86400000) / 3600000).toString().padStart(2,'0');
                document.getElementById("r-mins").innerText = Math.floor((rDiff % 3600000) / 60000).toString().padStart(2,'0');
                document.getElementById("r-secs").innerText = Math.floor((rDiff % 60000) / 1000).toString().padStart(2,'0');

                let speed = "2s";
                if (daysLeft < 7) {
                    speed = "0.5s";
                    document.getElementById("pulse-status").innerText = "⚠️ CRITICAL TIMEFRAME ⚠️";
                } else if (daysLeft < 30) {
                    speed = "1.2s";
                    document.getElementById("pulse-status").innerText = "THE FINAL STRETCH";
                }
                document.documentElement.style.setProperty('--pulse-duration', speed);
            } else {
                document.getElementById("pulse-status").innerText = "DEADLINE REACHED";
                document.getElementById("urgency-zone").style.borderColor = "var(--deep-green)";
                document.getElementById("urgency-zone").style.animation = "none";
            }
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
